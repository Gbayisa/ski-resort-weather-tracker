# Render Blueprint – deploys as a single unified web service.
# The Express backend serves both the /api routes and the pre-built React frontend.
# No VITE_API_BASE_URL is required; the frontend uses the relative /api prefix by default.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ski-resort-weather-tracker
    runtime: node
    # Build the frontend first, then install backend dependencies
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: node backend/src/index.js
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # ── Google AdSense (optional) ──────────────────────────────────────────
      # Set all three to enable live ads; leave blank to show placeholders.
      # These are compiled into the frontend bundle at build time.
      # See frontend/.env.example for full setup instructions.
      - key: VITE_ADSENSE_CLIENT
        sync: false
      - key: VITE_ADSENSE_SLOT_TOP
        sync: false
      - key: VITE_ADSENSE_SLOT_BOTTOM
        sync: false
